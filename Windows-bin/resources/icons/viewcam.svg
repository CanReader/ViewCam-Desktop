<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Eye outline gradient: warm gold → cyan → deep blue -->
    <linearGradient id="eyeOutline" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#ffd54f"/>
      <stop offset="40%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#0288d1"/>
    </linearGradient>

    <!-- Iris radial: 3D depth with off-center highlight -->
    <radialGradient id="iris" cx="0.42" cy="0.38" r="0.6">
      <stop offset="0%" stop-color="#3a7ca5"/>
      <stop offset="40%" stop-color="#1e4d6e"/>
      <stop offset="100%" stop-color="#0a1e30"/>
    </radialGradient>

    <!-- Inner glass element -->
    <radialGradient id="glass" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#1a3a55" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#050e18" stop-opacity="1"/>
    </radialGradient>

    <!-- Subtle top-left shine on iris -->
    <radialGradient id="shine" cx="0.35" cy="0.3" r="0.4">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Eye shape (filled dark + gradient stroke) -->
  <path
    d="M256 132 C155 132 70 198 36 256 C70 314 155 380 256 380 C357 380 442 314 476 256 C442 198 357 132 256 132Z"
    fill="#0d1828"
    stroke="url(#eyeOutline)"
    stroke-width="10"
    stroke-linejoin="round"
  />

  <!-- Outer iris (3D lens body) -->
  <circle cx="256" cy="256" r="105" fill="url(#iris)"/>
  <circle cx="256" cy="256" r="105" fill="url(#shine)"/>

  <!-- Lens ring grooves (concentric circles) -->
  <circle cx="256" cy="256" r="92" fill="none" stroke="#4fc3f7" stroke-width="1" opacity="0.15"/>
  <circle cx="256" cy="256" r="78" fill="none" stroke="#4fc3f7" stroke-width="1" opacity="0.12"/>

  <!-- Inner glass element -->
  <circle cx="256" cy="256" r="65" fill="url(#glass)" stroke="#29b6f6" stroke-width="3" opacity="0.8"/>

  <!-- 6-blade aperture (subtle, inside iris) -->
  <g opacity="0.2" fill="#4fc3f7">
    <polygon points="256,200 270,235 242,235"/>
    <polygon points="304,220 285,250 275,230"/>
    <polygon points="304,292 275,282 285,262"/>
    <polygon points="256,312 242,277 270,277"/>
    <polygon points="208,292 237,282 227,262"/>
    <polygon points="208,220 227,250 237,230"/>
  </g>

  <!-- Pupil -->
  <circle cx="256" cy="256" r="30" fill="#040c16"/>

  <!-- Glossy reflection arc (top-left of iris) -->
  <ellipse cx="240" cy="220" rx="40" ry="22" fill="white" opacity="0.08" transform="rotate(-20 240 220)"/>

  <!-- Primary light catch -->
  <circle cx="235" cy="232" r="14" fill="white" opacity="0.85"/>

  <!-- Secondary reflection -->
  <circle cx="278" cy="278" r="6" fill="white" opacity="0.35"/>

  <!-- Recording indicator dot (top-right) -->
  <circle cx="370" cy="165" r="10" fill="#f44336" opacity="0.9"/>
  <circle cx="370" cy="165" r="10" fill="#f44336" opacity="0.3">
    <animate attributeName="r" values="10;15;10" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.08;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
